    <style>
       

        /* Navbar */
        .navbar {
    background: #c8e6c9; /* Soft green from the image */
    padding: 10px 0;

    gap: 20px;

}


        .navbar .navbar-brand {

            color: black;

            font-weight: bold;

        }

        .dropdown select {

            border-radius: 5px;

        position: absolute;
        top: 100%; /* Position it right below the navbar */

        text-align: left; /* Align text */

    }
}


        
    </style>
</head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            text-align: center;
            background-color: #ffffff;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 30px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .grid-item {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            text-decoration: none !important;
        }

        .grid-item img {
            width: 90px;
            height: 70px;
            margin-bottom: 10px;
        }

        .grid-item:hover {
            transform: scale(1.05);
        }

        .rectangle {
            background-color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-top: 10px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
            font-size: 18px;
            font-weight: bold;
        }

        .rectangle img {
            width: 40px;
            height: 40px;
            margin-right: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="grid-container">
        <a href="LearnISL.html" style="text-decoration: none;">
        <div class="grid-item">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS87S_Pm1AXDeeZEt3mHQYmITNFsVq3FvZjJVlvJKZEXveEUo9vX6tzSgEuRwTxA-iPA7U&usqp=CAU" alt="Icon 1">
            <span>Learn Alphabets</span>
            
        </div>
    </a>
    <a href="LearnNumber.html" style="text-decoration: none;">
        <div class="grid-item">
            <img src="https://teachprints.com/wp-content/uploads/2024/08/ASL-Numbers-V4.jpg" alt="Icon 2">
            <span>Learn Numbers</span>
        </div>
        </a>
        <div class="grid-item">
            <img src="https://teachprints.com/wp-content/uploads/2024/08/ASL-Words-V4.jpg" alt="Icon 3" >
            <span>Learn Words</span>

        </div>
        <div class="grid-item">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSSHbLhj1innKDxHA6-wPF6yt3Z7Bc8z0KAUw&s" alt="Icon 4">
            <span>Hindi Sign</span>
        </div>
    </div>

    <div class="rectangle">
        <img src="translator-icon.png" alt="Translator">
        <span>Translator</span>
    </div>

    <div class="rectangle">
        <img src="quiz-icon.png" alt="Games">
        <span>Games & Quizzes</span>
    </div>
</div>



    <!-- Bootstrap JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
